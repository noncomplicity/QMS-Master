name: Update Frontmatter Metadata

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'
  workflow_dispatch:
    inputs:
      all_files:
        description: 'Process all markdown files'
        type: boolean
        default: true

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update frontmatter metadata
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: |
          process_file() {
            local file="$1"
            echo "Processing: $file"

            # Skip files without frontmatter
            if ! head -1 "$file" | grep -q "^---$"; then
              echo "  Skipping: No frontmatter found"
              return
            fi

            # Check for valid frontmatter structure
            FRONTMATTER_END=$(awk '/^---$/{c++;if(c==2){print NR;exit}}' "$file")
            if [ -z "$FRONTMATTER_END" ]; then
              echo "  Skipping: Invalid frontmatter structure"
              return
            fi

            # Get metadata from git
            FIRST_COMMIT=$(git log --follow --diff-filter=A --format='%h' -- "$file" | tail -1)
            COMMIT_COUNT=$(git log --first-parent --oneline -- "$file" | grep -v "chore: Update frontmatter metadata" | wc -l)
            LAST_AUTHOR=$(git log --format='%an' -- "$file" | grep -v 'github-actions\[bot\]' | head -1)
            LAST_DATE=$(git log -1 --format='%cs' -- "$file")

            # Derive title from filename
            BASENAME=$(basename "$file" .md)
            TITLE=$(echo "$BASENAME" | sed 's/-/ /g')

            echo "  id: $FIRST_COMMIT"
            echo "  title: $TITLE"
            echo "  version: $COMMIT_COUNT"
            echo "  author: $LAST_AUTHOR"
            echo "  effective_date: $LAST_DATE"

            # Update id only if empty
            if grep -q "^id:$" "$file" || grep -q "^id: *$" "$file"; then
              sed -i "s/^id:.*$/id: $FIRST_COMMIT/" "$file"
            fi
            sed -i "s/^title:.*$/title: \"$TITLE\"/" "$file"
            sed -i "s/^version:.*$/version: $COMMIT_COUNT/" "$file"
            sed -i "s/^author:.*$/author: \"$LAST_AUTHOR\"/" "$file"
            sed -i "s/^effective_date:.*$/effective_date: $LAST_DATE/" "$file"
          }

          # Always process all markdown files with frontmatter
          find . -name "*.md" -type f ! -path "./.git/*" ! -path "./.trash/*" | while IFS= read -r file; do
            process_file "$file"
          done

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if git diff --quiet; then
            echo "No metadata changes to commit"
          else
            git add -A
            git commit -m "chore: Update frontmatter metadata [skip ci]"
            git push
          fi
